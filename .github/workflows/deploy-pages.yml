name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APPS_SCRIPT_WEBAPP_URL: ${{ vars.NEXT_PUBLIC_APPS_SCRIPT_WEBAPP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Verify Apps Script URL
        run: |
          if [ -z "${NEXT_PUBLIC_APPS_SCRIPT_WEBAPP_URL}" ]; then
            echo "::error::NEXT_PUBLIC_APPS_SCRIPT_WEBAPP_URL is not set in GitHub repository variables."
            exit 1
          fi
          echo "NEXT_PUBLIC_APPS_SCRIPT_WEBAPP_URL detected for production build."

      - name: Build static export
        env:
          NEXT_PUBLIC_APPS_SCRIPT_WEBAPP_URL: ${{ vars.NEXT_PUBLIC_APPS_SCRIPT_WEBAPP_URL }}
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
